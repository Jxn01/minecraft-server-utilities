# mcsu — Minecraft Server Utilities configuration
# Generated by `mcsu init`. Durations accept values like "1h30m" or "240s".
# Docs: https://github.com/jxn01/minecraft_server_utilities

[server]
name = "survival"              # label used in logs & notifications
directory = "."             # server working dir, relative to this file
jar = "server.jar"
loader = "paper"          # vanilla|paper|purpur|fabric|forge|neoforge|quilt
mc_version = "1.20.4"
stop_timeout = 90              # seconds to wait for a graceful stop
auto_accept_eula = false      # write eula.txt automatically (you accept the Minecraft EULA)

[java]
path = ""                  # empty = auto-detect via JAVA_HOME / PATH
min_memory = "2G"
max_memory = "6G"
extra_flags = ["-XX:+UseG1GC", "-XX:+ParallelRefProcEnabled", "-XX:MaxGCPauseMillis=200", "-XX:+UnlockExperimentalVMOptions", "-XX:+DisableExplicitGC"]
server_args = ["nogui"]

[rcon]
enabled = true
host = "127.0.0.1"
port = 25575
password = "change-me-to-a-strong-secret"        # must match server.properties rcon.password
timeout = 5.0

[backup]
enabled = true
directory = "backups"
paths = ["world", "world_nether", "world_the_end"]
interval = 3600             # seconds between backups
format = "tar.gz"           # tar.gz|tar|zip
compression_level = 6
keep = 48                    # max archives to retain (0 = unlimited)
keep_days = 14                # also prune archives older than N days (0 = off)
skip_if_no_players = true    # don't back up an idle, unchanged world
flush_before_backup = true   # save-off/save-all via RCON for a consistent snapshot

[restart]
enabled = true
interval = 14400            # seconds between scheduled restarts (0 = off)
daily_times = ["04:00"]            # e.g. ["04:00"] for wall-clock restarts
warning_seconds = [300, 60, 30, 10, 5, 4, 3, 2, 1]
warning_message = "Server restarting in {time}!"

[watchdog]
enabled = true
check_interval = 15
max_restarts = 5            # within restart_window before giving up (0 = unlimited)
restart_window = 600
restart_backoff = 5

[notifications]
enabled = false
discord_webhook = ""
username = "mcsu"
events = ["server_ready", "server_stopped", "server_crashed", "backup_completed", "backup_failed"]
notify_player_join = false
notify_player_leave = false
notify_chat = false

